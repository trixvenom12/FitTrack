name: fittrack
description: A fitness tracking application

version: 2.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons:
  meta:
  provider:
  http:
  shared_preferences:

  # Localization & Notifications
  flutter_localizations:
    sdk: flutter
  flutter_local_notifications:
  timezone:

  # Fitness & Health
  google_fit:
  health:

  # Charts & UI
  syncfusion_flutter_charts:
  flutter_svg:
  cached_network_image:
  like_button:
  timeago:

  # Media & Image Processing
  image_picker:
  camera:

  # Barcode scanning
  barcode_scan2:
  google_mlkit_barcode_scanning:
  google_mlkit_commons:

  # AI & Cloud
  tflite:
  cloudinary_sdk:
  tflite_flutter:
  tflite_flutter_helper:

  # Firebase Messaging
  firebase_messaging:

  # Color & Math
  material_color_utilities:
  vector_math:
  flutter_barcode_scanner:

  # Local Database
  sqflite:
  path_provider:
  path:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:

flutter:
  uses-material-design: true
